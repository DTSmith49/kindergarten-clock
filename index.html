<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindergarten Clock Adventure</title>
    <style>
        :root {
            --hour-color: #3498db;
            --minute-color: #e74c3c;
            --second-color: #f1c40f;
            --bg-color: #f0f9ff;
        }

        body {
            margin: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive';
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .background-decor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #2c3e50;
            font-size: 2rem;
            margin: 10px 0;
            text-shadow: 2px 2px white;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90vw;
        }

        #clock-container {
            position: relative;
            width: 320px;
            height: 320px;
            background: white;
            border-radius: 50%;
            border: 10px solid #bdc3c7;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .clock-face {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .number {
            position: absolute;
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 40px;
            font-size: 24px;
            font-weight: bold;
            transform: translate(-50%, -50%);
        }

        .second-number {
            position: absolute;
            font-size: 14px;
            font-weight: normal;
            color: #7f8c8d;
            transform: translate(-50%, -50%);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
            cursor: grab;
            transition: transform 0.1s cubic-bezier(0, 0, 0.2, 1);
        }

        .hand:active {
            cursor: grabbing;
        }

        #hour-hand {
            width: 12px;
            height: 70px;
            background-color: var(--hour-color);
            z-index: 3;
        }

        #minute-hand {
            width: 8px;
            height: 110px;
            background-color: var(--minute-color);
            z-index: 2;
        }

        #second-hand {
            width: 4px;
            height: 130px;
            background-color: var(--second-color);
            z-index: 1;
        }

        .center-cap {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: #2c3e50;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            border: 3px solid white;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            font-size: 18px;
            font-family: inherit;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #e67e22; color: white; }

        .time-display {
            font-size: 32px;
            margin: 15px 0;
            color: #2c3e50;
            font-weight: bold;
            min-height: 45px;
        }

        .prompt-area {
            background: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 20px;
            border: 2px dashed #3498db;
        }

        .feedback {
            position: fixed;
            top: 20%;
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            z-index: 100;
            animation: popOut 1s forwards;
            display: none;
        }

        @keyframes popOut {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; transform: translateY(-50px); }
        }

        .star-container {
            margin-top: 10px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="background-decor">
        <svg width="100%" height="100%">
            <circle cx="10%" cy="10%" r="50" fill="#ff7675" opacity="0.2"/>
            <circle cx="90%" cy="15%" r="70" fill="#74b9ff" opacity="0.2"/>
            <circle cx="20%" cy="80%" r="60" fill="#55efc4" opacity="0.2"/>
            <circle cx="85%" cy="85%" r="40" fill="#ffeaa7" opacity="0.2"/>
        </svg>
    </div>

    <div class="header">
        <h1>Clock Adventure!</h1>
    </div>

    <div class="game-container">
        <div class="prompt-area" id="prompt">Move the hands to explore!</div>
        
        <div id="clock-container">
            <div class="clock-face" id="face">
                <div class="center-cap"></div>
                <div id="hour-hand" class="hand"></div>
                <div id="minute-hand" class="hand"></div>
                <div id="second-hand" class="hand"></div>
            </div>
        </div>

        <div class="time-display" id="digital-time">12:00:00</div>

        <div class="controls">
            <button class="btn-blue" onclick="newChallenge()">New Challenge</button>
            <button class="btn-green" onclick="checkTime()">Check!</button>
            <button class="btn-orange" onclick="resetClock()">Reset</button>
        </div>

        <div class="star-container" id="stars">⭐⭐⭐</div>
    </div>

    <div id="feedback" class="feedback">Great!</div>

    <script>
        const face = document.getElementById('face');
        const hourHand = document.getElementById('hour-hand');
        const minuteHand = document.getElementById('minute-hand');
        const secondHand = document.getElementById('second-hand');
        const digitalDisplay = document.getElementById('digital-time');
        const promptArea = document.getElementById('prompt');
        const feedback = document.getElementById('feedback');

        let currentH = 12, currentM = 0, currentS = 0;
        let targetH = null, targetM = null;
        let mode = 'free';

        const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6', '#e84393', '#d63031', '#fdcb6e', '#00b894', '#0984e3', '#6c5ce7'];

        function createClockFace() {
            // Main hours 1-12
            for (let i = 1; i <= 12; i++) {
                const num = document.createElement('div');
                num.className = 'number';
                num.textContent = i;
                num.style.color = colors[i-1];
                
                const angle = (i * 30) * (Math.PI / 180);
                const x = 160 + 120 * Math.sin(angle);
                const y = 160 - 120 * Math.cos(angle);
                
                num.style.left = x + 'px';
                num.style.top = y + 'px';
                face.appendChild(num);
            }

            // Second/Minute numbers 0-55
            for (let i = 0; i < 60; i += 5) {
                const sNum = document.createElement('div');
                sNum.className = 'second-number';
                sNum.textContent = i === 0 ? '0' : i;
                
                const angle = (i * 6) * (Math.PI / 180);
                const x = 160 + 145 * Math.sin(angle);
                const y = 160 - 145 * Math.cos(angle);
                
                sNum.style.left = x + 'px';
                sNum.style.top = y + 'px';
                face.appendChild(sNum);
            }
        }

        function updateClockUI() {
            const sDeg = currentS * 6;
            const mDeg = currentM * 6 + currentS * 0.1;
            const hDeg = (currentH % 12) * 30 + currentM * 0.5;

            secondHand.style.transform = `translateX(-50%) rotate(${sDeg}deg)`;
            minuteHand.style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
            hourHand.style.transform = `translateX(-50%) rotate(${hDeg}deg)`;

            const dispH = currentH === 0 ? 12 : (currentH > 12 ? currentH - 12 : currentH);
            digitalDisplay.textContent = 
                `${String(dispH).padStart(2, '0')}:${String(currentM).padStart(2, '0')}:${String(currentS).padStart(2, '0')}`;
        }

        function handleDrag(e, handType) {
            e.preventDefault();
            const rect = document.getElementById('clock-container').getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const moveHandler = (moveEvt) => {
                const clientX = moveEvt.touches ? moveEvt.touches[0].clientX : moveEvt.clientX;
                const clientY = moveEvt.touches ? moveEvt.touches[0].clientY : moveEvt.clientY;

                let angle = Math.atan2(clientX - centerX, centerY - clientY) * (180 / Math.PI);
                if (angle < 0) angle += 320; // Correcting range

                if (handType === 'second') {
                    currentS = Math.round(angle / 6) % 60;
                } else if (handType === 'minute') {
                    currentM = Math.round(angle / 6) % 60;
                } else if (handType === 'hour') {
                    currentH = Math.round(angle / 30) % 12;
                    if (currentH === 0) currentH = 12;
                }
                updateClockUI();
            };

            const upHandler = () => {
                window.removeEventListener('mousemove', moveHandler);
                window.removeEventListener('mouseup', upHandler);
                window.removeEventListener('touchmove', moveHandler);
                window.removeEventListener('touchend', upHandler);
            };

            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('mouseup', upHandler);
            window.addEventListener('touchmove', moveHandler, {passive: false});
            window.addEventListener('touchend', upHandler);
        }

        secondHand.addEventListener('mousedown', (e) => handleDrag(e, 'second'));
        minuteHand.addEventListener('mousedown', (e) => handleDrag(e, 'minute'));
        hourHand.addEventListener('mousedown', (e) => handleDrag(e, 'hour'));
        
        secondHand.addEventListener('touchstart', (e) => handleDrag(e, 'second'), {passive: false});
        minuteHand.addEventListener('touchstart', (e) => handleDrag(e, 'minute'), {passive: false});
        hourHand.addEventListener('touchstart', (e) => handleDrag(e, 'hour'), {passive: false});

        function newChallenge() {
            targetH = Math.floor(Math.random() * 12) + 1;
            targetM = [0, 15, 30, 45][Math.floor(Math.random() * 4)];
            promptArea.textContent = `Can you show ${targetH}:${targetM === 0 ? '00' : targetM}?`;
            mode = 'challenge';
        }

        function checkTime() {
            if (mode !== 'challenge') return;
            
            if (currentH === targetH && currentM === targetM) {
                showFeedback("Correct! ⭐", "#2ecc71");
                promptArea.textContent = "Great job! Try another one?";
            } else {
                showFeedback("Try again!", "#e74c3c");
            }
        }

        function showFeedback(text, color) {
            feedback.textContent = text;
            feedback.style.color = color;
            feedback.style.display = 'block';
            setTimeout(() => feedback.style.display = 'none', 1000);
        }

        function resetClock() {
            currentH = 12; currentM = 0; currentS = 0;
            updateClockUI();
            promptArea.textContent = "Move the hands to explore!";
            mode = 'free';
        }

        createClockFace();
        updateClockUI();
    </script>
</body>
</html>
